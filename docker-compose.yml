services:
  postgres:
    image: postgres:16-alpine
    container_name: plata-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plata
      POSTGRES_PASSWORD: plata
      POSTGRES_DB: plata
    ports:
      - "5432:5432"
    volumes:
      - plata-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plata -d plata"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  plata-pgdata:
